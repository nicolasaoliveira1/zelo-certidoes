<!doctype html>
<!--
  Harness isolado para inspecionar visualmente os filtros do dashboard em várias larguras.
  NÃO faz parte do app. Replica a estrutura/Bootstrap/style.css reais para medir wrap, título e divider.
  Renderizado pelo Playwright em tools/ui-harness/shot_filtros.py.
-->
<html lang="pt-br" data-bs-theme="dark">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Harness · Filtros</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../app/static/css/style.css">
</head>

<body>
    <main class="container-fluid app-main mt-4 px-0">
        <div class="card shadow-sm border-0 mb-3 bg-body-tertiary rounded-3">
            <div class="card-body p-3">
                <div class="d-flex flex-wrap gap-3 w-100 filter-container">
                    <div style="flex: 1 1 30%; min-width: 250px;">
                        <label for="filtroEmpresa" class="form-label fw-bold text-secondary text-uppercase small">Buscar
                            Empresa</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i
                                    class="bi bi-search text-muted"></i></span>
                            <input type="search" class="form-control border-start-0 ps-1" id="filtroEmpresa"
                                placeholder="Digite o nome...">
                        </div>
                    </div>

                    <div style="flex: 0 1 auto; min-width: 160px;">
                        <label for="filtro-estado"
                            class="form-label fw-bold text-secondary text-uppercase small">Estado</label>
                        <select class="form-select" id="filtro-estado">
                            <option value="">Todos</option>
                            <option value="RS">RS</option>
                        </select>
                    </div>

                    <div style="flex: 0 1 auto; min-width: 220px;">
                        <label for="filtro-cidade"
                            class="form-label fw-bold text-secondary text-uppercase small">Cidade</label>
                        <select class="form-select" id="filtro-cidade">
                            <option value="">Todas</option>
                            <option value="IMBE">IMBE</option>
                        </select>
                    </div>
                </div>

                <div class="mt-3">
                    <form class="mb-0">
                        <div class="d-flex flex-wrap justify-content-center" style="align-items: flex-start; row-gap: 1rem;">
                            <div class="filter-group">
                                <label class="form-label fw-bold text-secondary text-uppercase small mb-2">Status</label>
                                <div class="chip-row">

                                    <input type="checkbox" class="btn-check" id="status-todas" checked>
                                    <label class="filter-chip chip-gray" for="status-todas">
                                        <i class="bi bi-grid-fill"></i>
                                        <span class="chip-label">Todas <span class="chip-count">501</span></span>
                                    </label>

                                    <input type="checkbox" class="btn-check" id="status-validas">
                                    <label class="filter-chip chip-green" for="status-validas">
                                        <i class="bi bi-check-circle-fill"></i>
                                        <span class="chip-label">Válidas <span class="chip-count">378</span></span>
                                    </label>

                                    <input type="checkbox" class="btn-check" id="status-a-vencer">
                                    <label class="filter-chip chip-yellow" for="status-a-vencer">
                                        <i class="bi bi-exclamation-triangle-fill"></i>
                                        <span class="chip-label">A Vencer <span class="chip-count">34</span></span>
                                    </label>

                                    <input type="checkbox" class="btn-check" id="status-vencidas">
                                    <label class="filter-chip chip-red" for="status-vencidas">
                                        <i class="bi bi-x-circle-fill"></i>
                                        <span class="chip-label">Vencidas <span class="chip-count">0</span></span>
                                    </label>

                                    <input type="checkbox" class="btn-check" id="status-pendentes">
                                    <label class="filter-chip chip-red-outline" for="status-pendentes">
                                        <i class="bi bi-exclamation-circle-fill"></i>
                                        <span class="chip-label">Pendentes <span class="chip-count">85</span></span>
                                    </label>

                                    <input type="checkbox" class="btn-check" id="status-nao-definida">
                                    <label class="filter-chip chip-nao-definida" for="status-nao-definida">
                                        <i class="bi bi-question-circle-fill"></i>
                                        <span class="chip-label">Não Definida <span class="chip-count">4</span></span>
                                    </label>

                                </div>
                            </div>

                            <div class="filter-divider" aria-hidden="true"></div>

                            <div class="filter-group">
                                <label class="form-label fw-bold text-secondary text-uppercase small mb-2">Tipo de
                                    Certidão</label>
                                <div class="chip-row">

                                    <input type="checkbox" class="btn-check" id="tipo-todas" checked>
                                    <label class="filter-chip chip-gray" for="tipo-todas">
                                        <i class="bi bi-grid-fill"></i>
                                        <span class="chip-label">Todas <span class="chip-count">501</span></span>
                                    </label>

                                    <input type="checkbox" class="btn-check" id="tipo-federal">
                                    <label class="filter-chip chip-federal" for="tipo-federal">
                                        <i class="bi bi-bank"></i>
                                        <span class="chip-label">Federal <span class="chip-count">90</span></span>
                                    </label>

                                    <input type="checkbox" class="btn-check" id="tipo-fgts">
                                    <label class="filter-chip chip-fgts" for="tipo-fgts">
                                        <i class="bi bi-person-badge"></i>
                                        <span class="chip-label">FGTS <span class="chip-count">90</span></span>
                                    </label>

                                    <input type="checkbox" class="btn-check" id="tipo-estadual">
                                    <label class="filter-chip chip-estadual" for="tipo-estadual">
                                        <i class="bi bi-map"></i>
                                        <span class="chip-label">Estadual <span class="chip-count">90</span></span>
                                    </label>

                                    <input type="checkbox" class="btn-check" id="tipo-municipal">
                                    <label class="filter-chip chip-municipal" for="tipo-municipal">
                                        <i class="bi bi-building"></i>
                                        <span class="chip-label">Municipal <span class="chip-count">141</span></span>
                                    </label>

                                    <input type="checkbox" class="btn-check" id="tipo-trabalhista">
                                    <label class="filter-chip chip-trabalhista" for="tipo-trabalhista">
                                        <i class="bi bi-briefcase"></i>
                                        <span class="chip-label">Trabalhista <span class="chip-count">90</span></span>
                                    </label>

                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>
        // expõe medição para o Playwright inspecionar o estado de cada grupo
        window.medirFiltros = function () {
            return Array.from(document.querySelectorAll('.filter-group')).map(g => {
                const chips = Array.from(g.querySelectorAll('.filter-chip'));
                const tops = chips.map(c => c.offsetTop);
                const linhas = new Set(tops).size;
                const titulo = g.querySelector('label');
                return {
                    titulo: titulo ? titulo.textContent.trim() : '',
                    chips: chips.length,
                    linhas,
                    tituloCentralizado: titulo ? getComputedStyle(titulo).textAlign === 'center' : false,
                    larguraGrupo: Math.round(g.getBoundingClientRect().width),
                };
            });
        };
    </script>
</body>

</html>
