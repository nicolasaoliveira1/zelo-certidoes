{% extends "base.html" %}
{% block titulo %}Diagnóstico{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0"><i class="bi bi-activity me-2"></i>Diagnóstico</h4>
    <div class="d-flex align-items-center gap-2">
        <span id="diag-status" class="text-muted small"></span>
        <button id="diag-refresh" class="btn btn-sm btn-outline-secondary" type="button">
            <i class="bi bi-arrow-clockwise"></i> Atualizar
        </button>
    </div>
</div>

<div id="diag-alertas" class="mb-3"></div>

<div class="row g-3 mb-3">
    <div class="col-12 col-sm-6 col-lg-4">
        <div class="card h-100">
            <div class="card-body d-flex align-items-center justify-content-between gap-3">
                <div>
                    <div class="text-uppercase text-muted small fw-semibold">Saldo 2captcha</div>
                    <div id="captcha-saldo" class="fs-3 fw-semibold" style="font-family: var(--zelo-font-mono);">—</div>
                </div>
                <span id="captcha-badge" class="badge rounded-pill text-bg-secondary">…</span>
            </div>
            <div class="card-footer small text-muted" id="captcha-nota">Consultando saldo…</div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header fw-semibold">Últimos erros e avisos</div>
    <div class="table-responsive">
        <table class="table table-sm table-hover mb-0 align-middle">
            <thead>
                <tr>
                    <th style="width: 150px;">Quando</th>
                    <th style="width: 70px;">Nível</th>
                    <th style="width: 120px;">Tipo</th>
                    <th style="width: 110px;">Alvo</th>
                    <th>Mensagem</th>
                    <th style="width: 110px;">req_id</th>
                </tr>
            </thead>
            <tbody id="diag-eventos">
                <tr><td colspan="6" class="text-center text-muted py-3">Carregando…</td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    (function () {
        const tbody = document.getElementById('diag-eventos');
        const alertasEl = document.getElementById('diag-alertas');
        const statusEl = document.getElementById('diag-status');
        const btn = document.getElementById('diag-refresh');

        const BADGE = { ERROR: 'text-bg-danger', WARNING: 'text-bg-warning', INFO: 'text-bg-secondary' };

        function esc(v) {
            const d = document.createElement('div');
            d.textContent = (v === null || v === undefined) ? '' : String(v);
            return d.innerHTML;
        }

        function formatarData(iso) {
            if (!iso) return '';
            const d = new Date(iso);
            if (isNaN(d)) return esc(iso);
            return d.toLocaleString('pt-BR');
        }

        function renderAlertas(alertas) {
            if (!alertas || !alertas.length) { alertasEl.innerHTML = ''; return; }
            alertasEl.innerHTML = alertas.map(a => `
                <div class="alert alert-warning d-flex align-items-start gap-2 mb-2" role="alert">
                    <i class="bi bi-exclamation-triangle-fill fs-5"></i>
                    <div>
                        <strong>${esc(a.error_type)} em ${esc(a.alvo)}</strong>
                        — ${esc(a.ocorrencias)} ocorrências.
                        <div class="small">${esc(a.hipotese)}</div>
                    </div>
                </div>`).join('');
        }

        function renderEventos(eventos) {
            if (!eventos || !eventos.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-3">Nenhum erro ou aviso registrado.</td></tr>';
                return;
            }
            tbody.innerHTML = eventos.map(e => {
                const badge = BADGE[(e.nivel || '').toUpperCase()] || 'text-bg-secondary';
                return `<tr>
                    <td class="small">${formatarData(e.criado_em)}</td>
                    <td><span class="badge ${badge}">${esc(e.nivel)}</span></td>
                    <td class="small">${esc(e.error_type || '')}</td>
                    <td class="small">${esc(e.alvo || '')}</td>
                    <td class="small">${esc(e.mensagem || e.evento || '')}</td>
                    <td class="small text-muted">${esc(e.request_id || '')}</td>
                </tr>`;
            }).join('');
        }

        function carregar() {
            statusEl.textContent = 'atualizando…';
            fetch('{{ url_for("main.diagnostico_eventos") }}')
                .then(r => r.json())
                .then(data => {
                    renderAlertas(data.alertas);
                    renderEventos(data.eventos);
                    statusEl.textContent = 'atualizado ' + new Date().toLocaleTimeString('pt-BR');
                })
                .catch(() => { statusEl.textContent = 'falha ao atualizar'; });
        }

        btn.addEventListener('click', carregar);
        carregar();
        setInterval(carregar, 15000);
    })();

    // Saldo do 2captcha (consulta best-effort; nao bloqueia o carregamento da pagina)
    (function () {
        const saldoEl = document.getElementById('captcha-saldo');
        const badgeEl = document.getElementById('captcha-badge');
        const notaEl = document.getElementById('captcha-nota');

        function fmtUSD(v) {
            try { return Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'USD' }); }
            catch (e) { return '$' + Number(v).toFixed(2); }
        }

        function render(d) {
            if (!d.configurado) {
                saldoEl.textContent = '—';
                badgeEl.className = 'badge rounded-pill text-bg-secondary';
                badgeEl.textContent = 'não configurado';
                notaEl.textContent = 'Chave CAPTCHA_2_API_KEY não configurada no ambiente.';
                return;
            }
            if (d.saldo === null || d.saldo === undefined) {
                saldoEl.textContent = '—';
                badgeEl.className = 'badge rounded-pill text-bg-secondary';
                badgeEl.textContent = 'indisponível';
                notaEl.textContent = 'Não foi possível consultar o saldo (rede ou API do 2captcha).';
                return;
            }
            saldoEl.textContent = fmtUSD(d.saldo);
            if (d.baixo) {
                badgeEl.className = 'badge rounded-pill text-bg-warning';
                badgeEl.textContent = 'saldo baixo';
                notaEl.textContent = 'Abaixo do mínimo de alerta (' + fmtUSD(d.minimo) + '). Recarregue os créditos.';
            } else {
                badgeEl.className = 'badge rounded-pill text-bg-success';
                badgeEl.textContent = 'ok';
                notaEl.textContent = 'Mínimo de alerta: ' + fmtUSD(d.minimo) + '.';
            }
        }

        fetch('{{ url_for("main.diagnostico_2captcha") }}')
            .then(r => r.json())
            .then(render)
            .catch(() => { notaEl.textContent = 'Falha ao consultar o saldo.'; });
    })();
</script>
{% endblock %}
