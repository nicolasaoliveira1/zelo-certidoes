<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Entrar · Zelo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:wght@500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ static_versionado('css/style.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/assecon.ico') }}">

    <script>
        // evita o flash do tema claro (mesmo padrao do base.html)
        (function () {
            const stored = localStorage.getItem('theme');
            const theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-bs-theme', theme);
        })();
    </script>

    <style>
        .login-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            border: 1px solid var(--zelo-line);
            background: var(--zelo-paper);
            border-radius: 0.75rem;
            box-shadow: 0 10px 24px rgba(0, 0, 0, .09);
            padding: 2rem 1.75rem;
        }

        .login-wordmark {
            font-family: var(--zelo-font-display);
            font-weight: 600;
            font-size: 2rem;
            line-height: 1;
            color: var(--zelo-ink);
            text-align: center;
            margin-bottom: 0.25rem;
        }

        .login-sub {
            font-family: var(--zelo-font-body);
            color: var(--zelo-slate);
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="login-wrap">
        <div class="login-card">
            <div class="login-wordmark">Zelo</div>
            <div class="login-sub">Controle de certidões fiscais</div>

            {% with mensagens = get_flashed_messages(with_categories=true) %}
            {% for categoria, msg in mensagens %}
            <div class="alert alert-{{ 'danger' if categoria == 'danger' else 'info' }} py-2" role="alert">{{ msg }}</div>
            {% endfor %}
            {% endwith %}

            <form method="post" action="{{ url_for('auth.login') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">

                <div class="mb-3">
                    <label for="username" class="form-label">Usuário</label>
                    <input type="text" class="form-control" id="username" name="username" autocomplete="username"
                        autofocus required>
                </div>
                <div class="mb-4">
                    <label for="senha" class="form-label">Senha</label>
                    <input type="password" class="form-control" id="senha" name="senha"
                        autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Entrar</button>
            </form>
        </div>
    </div>
</body>

</html>
